<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="icon" type="image/png" href="assets/logos/simplehpc-favicon.png">
  <link rel="stylesheet" href="css/theme.css?v=20260711ui-consistency1">
  <title>simpleHPC — 巡检详细日志</title>
  <style>
    *{box-sizing:border-box}
    html,body{overflow:auto}
    body{
      margin:0;
      min-height:100vh;
      background:
        radial-gradient(circle at 76% 4%, rgba(90,200,250,.18), transparent 28%),
        radial-gradient(circle at 16% 18%, rgba(10,132,255,.10), transparent 26%),
        linear-gradient(180deg,#fbfcff 0%,#f5f7fa 48%,#f7f8fa 100%);
      color:#111827;
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang SC",system-ui,sans-serif;
      -webkit-font-smoothing:antialiased;
    }
    body:before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background:
        linear-gradient(rgba(37,99,235,.022) 1px,transparent 1px),
        linear-gradient(90deg,rgba(37,99,235,.022) 1px,transparent 1px);
      background-size:58px 58px;
      mask-image:linear-gradient(180deg,#000 0%,transparent 74%);
    }
    header{
      position:sticky;
      top:0;
      z-index:1;
      height:72px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      padding:0 28px;
      border-bottom:1px solid rgba(229,231,235,.82);
      background:rgba(255,255,255,.78);
      box-shadow:0 1px 0 rgba(255,255,255,.7);
      backdrop-filter:blur(22px) saturate(1.18);
      -webkit-backdrop-filter:blur(22px) saturate(1.18);
    }
    h1{font-size:18px;letter-spacing:-.03em;margin:0}
    small{color:#6b7280}
    .actions{display:flex;gap:10px;flex-wrap:wrap}
    .btn{
      border:1px solid rgba(229,231,235,.9);
      border-radius:var(--shpc-control-radius,8px);
      padding:9px 15px;
      color:#374151;
      background:rgba(255,255,255,.78);
      text-decoration:none;
      font-size:13px;
      font-weight:650;
      font-family:var(--font-body);
      cursor:pointer;
      box-shadow:0 1px 2px rgba(16,24,40,.04);
      transition:.18s ease;
    }
    .btn:hover{transform:translateY(-1px);border-color:rgba(10,132,255,.30);box-shadow:0 12px 28px rgba(17,24,39,.09)}
    .primary{border-color:var(--shpc-brand-action,#23699a);color:#fff;background:var(--shpc-brand-action,#23699a);box-shadow:none}
    main{position:relative;z-index:1;padding:24px}
    .log{
      margin:0;
      min-height:calc(100vh - 120px);
      padding:24px;
      border:1px solid rgba(255,255,255,.72);
      border-radius:var(--shpc-panel-radius,8px);
      background:#fff;
      color:#374151;
      white-space:pre-wrap;
      overflow-wrap:anywhere;
      font:12px/1.75 "SFMono-Regular",Consolas,ui-monospace,monospace;
      box-shadow:var(--shpc-panel-shadow,0 1px 2px rgba(16,24,40,.04));
    }
    .error{color:#b42318}
  </style>
</head>
<body>
  <header><div><h1>巡检详细日志</h1><small id="runLabel">正在读取...</small></div><div class="actions"><button class="btn" id="refresh">立即刷新</button><a class="btn primary" id="download">下载日志</a></div></header>
  <main><pre class="log" id="log">正在读取真实巡检日志...</pre></main>
  <script>
  (function(){
    const params=new URLSearchParams(location.search),id=params.get('id'),run=params.get('run')||'';
    const token=localStorage.getItem('simplehpc_token')||'';
    document.getElementById('runLabel').textContent=run||('记录 #'+id);
    document.getElementById('download').href='/api/v1/inspection/runs/'+encodeURIComponent(id)+'/log/download';
    async function load(){
      try{const res=await fetch('/api/v1/inspection/runs/'+encodeURIComponent(id)+'/log',{cache:'no-store',headers:token?{Authorization:'Bearer '+token}:{}});
        const text=await res.text();if(!res.ok)throw new Error(text||('HTTP '+res.status));document.getElementById('log').textContent=text;
      }catch(error){document.getElementById('log').textContent='数据未获取：'+error.message;document.getElementById('log').classList.add('error');}
    }
    document.getElementById('refresh').addEventListener('click',load);load();
  }());
  </script>
</body></html>
