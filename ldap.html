<script src="js/app.js?v=20260703profile"></script>
<script>
(function () {
  const fields = {
    url: document.getElementById('ldapUrl'),
    baseDN: document.getElementById('ldapBaseDN'),
    bindDN: document.getElementById('ldapBindDN'),
    bindPassword: document.getElementById('ldapBindPassword')
  };
  const state = document.getElementById('ldapConfigState');
  function payload() {
    return {
      url: fields.url.value.trim(),
      baseDN: fields.baseDN.value.trim(),
      bindDN: fields.bindDN.value.trim(),
      bindPassword: fields.bindPassword.value
    };
  }
  async function request(url, options) {
    const res = await fetch(url, Object.assign({ headers: { 'Content-Type': 'application/json' }, cache: 'no-store' }, options || {}));
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.error || ('HTTP ' + res.status));
    return data;
  }
  async function load() {
    try {
      const data = await request('/api/v1/config/ldap');
      const cfg = data.config || {};
      fields.url.value = cfg.url || '';
      fields.baseDN.value = cfg.baseDN || '';
      fields.bindDN.value = cfg.bindDN || '';
      fields.bindPassword.value = '';
      state.textContent = '配置来自后端 API';
    } catch (err) {
      state.textContent = '数据未获取：' + err.message;
      App.toast('LDAP 配置数据未获取：' + err.message, 'danger');
    }
  }
  document.getElementById('ldapTestBtn').addEventListener('click', async function () {
    try {
      await request('/api/v1/config/ldap/test', { method: 'POST', body: JSON.stringify(payload()) });
      App.toast('LDAP 连接成功', 'success');
    } catch (err) {
      App.toast('LDAP 连接失败：' + err.message, 'danger');
    }
  });
  document.getElementById('ldapSaveBtn').addEventListener('click', async function () {
    try {
      await request('/api/v1/config/ldap', { method: 'PUT', body: JSON.stringify(payload()) });
      App.toast('LDAP 配置已保存', 'success');
      await load();
    } catch (err) {
      App.toast('LDAP 配置保存失败：' + err.message, 'danger');
    }
  });
  load();
})();
</script>
