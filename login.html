<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>simpleHPC — 登录</title>
<link rel="icon" href="data:,">
<link rel="stylesheet" href="css/theme.css?v=20260705navdrop2">
<style>
  :root {
    --login-blue: #007aff;
    --login-blue-strong: #0a84ff;
    --login-text: #111827;
    --login-muted: #4b5563;
    --login-soft: rgba(255,255,255,.68);
  }

  html,
  body {
    min-height: 100%;
  }

  body {
    overflow: hidden;
    background: #f8fbff;
  }

  .login-page {
    position: relative;
    min-height: 100vh;
    overflow: hidden;
    background:
      radial-gradient(circle at 68% 18%, rgba(96, 165, 250, 0.22), transparent 32%),
      radial-gradient(circle at 22% 72%, rgba(219, 234, 254, 0.65), transparent 42%),
      linear-gradient(135deg, #f8fbff 0%, #eef7ff 48%, #f9fbff 100%);
    color: var(--login-text);
  }

  .login-bg {
    position: absolute;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background:
      linear-gradient(rgba(37,99,235,.032) 1px, transparent 1px),
      linear-gradient(90deg, rgba(37,99,235,.026) 1px, transparent 1px),
      linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.70));
    background-size: 64px 64px, 64px 64px, auto;
    mask-image: linear-gradient(180deg, rgba(0,0,0,.56), rgba(0,0,0,.14) 72%, transparent 100%);
    -webkit-mask-image: linear-gradient(180deg, rgba(0,0,0,.56), rgba(0,0,0,.14) 72%, transparent 100%);
  }

  .login-bg::after {
    content: "";
    position: absolute;
    left: 11vw;
    right: 5vw;
    bottom: 2vh;
    height: 30vh;
    opacity: .48;
    background:
      linear-gradient(112deg, transparent 4%, rgba(10,132,255,.18) 4.25%, transparent 4.7%),
      linear-gradient(126deg, transparent 21%, rgba(90,200,250,.20) 21.22%, transparent 21.75%),
      linear-gradient(139deg, transparent 42%, rgba(37,99,235,.16) 42.22%, transparent 42.6%);
    mask-image: linear-gradient(180deg, transparent, rgba(0,0,0,.72) 34%, transparent);
    -webkit-mask-image: linear-gradient(180deg, transparent, rgba(0,0,0,.72) 34%, transparent);
  }

  .login-brand {
    position: absolute;
    z-index: 5;
    top: clamp(32px, 4vh, 56px);
    left: clamp(72px, 7vw, 140px);
    display: flex;
    align-items: center;
    gap: 12px;
    color: #111827;
    font-size: 22px;
    font-weight: 820;
    letter-spacing: -.045em;
  }

  .login-brand span span,
  .login-brand-name span {
    color: var(--login-blue);
  }

  .login-brand > .login-brand-name {
    font-size: inherit;
    font-weight: inherit;
    letter-spacing: inherit;
  }

  .logo-mark,
  .login-logo-mark {
    display: grid;
    place-items: center;
    width: 44px;
    height: 44px;
    border-radius: 13px;
    color: #fff;
    font-size: 20px;
    font-weight: 850;
    letter-spacing: -.03em;
    background:
      radial-gradient(circle at 26% 22%, rgba(255,255,255,.68), transparent 32%),
      linear-gradient(135deg, #36b4ff 0%, #007aff 100%);
    box-shadow: 0 16px 34px rgba(10,132,255,.24), inset 0 1px 0 rgba(255,255,255,.58);
  }

  .login-logo-mark {
    flex: 0 0 auto;
    object-fit: contain;
  }

  .login-shell {
    position: relative;
    z-index: 2;
    min-height: 100vh;
    display: grid;
    grid-template-columns: minmax(0, 1.25fr) minmax(420px, 0.75fr);
    align-items: center;
    gap: clamp(48px, 5vw, 96px);
    padding:
      clamp(72px, 8vh, 110px)
      clamp(72px, 7vw, 140px)
      clamp(56px, 7vh, 90px);
  }

  .login-left {
    position: relative;
    min-height: clamp(560px, 66vh, 720px);
    display: flex;
    align-items: center;
  }

  .hero-copy {
    position: relative;
    z-index: 3;
    max-width: 620px;
    margin-top: clamp(20px, 3vh, 40px);
  }

  .hero-copy h1 {
    margin: 0;
    font-size: clamp(48px, 4.4vw, 76px);
    line-height: 1.04;
    letter-spacing: -0.05em;
    font-weight: 760;
    color: #111827;
    text-wrap: balance;
  }

  .hero-copy p {
    margin: 18px 0 0;
    font-size: clamp(18px, 1.35vw, 24px);
    line-height: 1.5;
    color: #4b5563;
    font-weight: 560;
    letter-spacing: -.025em;
  }

  .server-visual {
    position: absolute;
    z-index: 1;
    inset: 0;
    width: 100%;
    height: 100%;
    max-height: none;
    object-fit: cover;
    object-position: center center;
    opacity: 0.58;
    filter: saturate(1.08) drop-shadow(0 40px 80px rgba(37, 99, 235, 0.10));
    mix-blend-mode: multiply;
    mask-image: none;
    -webkit-mask-image: none;
    pointer-events: none;
    user-select: none;
  }

  .feature-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(190px, 1fr));
    gap: 14px;
    margin-top: 36px;
    max-width: 560px;
  }

  .feature-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 14px 16px;
    border-radius: 18px;
    background: rgba(255,255,255,0.68);
    border: 1px solid rgba(226,232,240,0.9);
    box-shadow: 0 12px 32px rgba(15,23,42,0.06);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
  }

  .feature-icon {
    display: grid;
    place-items: center;
    flex: 0 0 auto;
    width: 38px;
    height: 38px;
    border-radius: 13px;
    color: var(--login-blue);
    background: linear-gradient(135deg, rgba(219,234,254,.96), rgba(240,249,255,.86));
    border: 1px solid rgba(191,219,254,.92);
    box-shadow: inset 0 1px 0 rgba(255,255,255,.86);
  }

  .feature-icon svg {
    width: 21px;
    height: 21px;
    fill: none;
    stroke: currentColor;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .feature-item strong {
    display: block;
    margin: 1px 0 4px;
    color: #111827;
    font-size: 15px;
    font-weight: 780;
  }

  .feature-item span {
    display: block;
    color: #64748b;
    font-size: 13px;
    line-height: 1.45;
    font-weight: 560;
  }

  .login-right {
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    z-index: 4;
  }

  .login-card {
    position: relative;
    width: clamp(420px, 30vw, 520px);
    padding: clamp(36px, 3.2vw, 52px);
    border-radius: 32px;
    background: rgba(255, 255, 255, 0.88);
    border: 1px solid rgba(255, 255, 255, 0.82);
    box-shadow:
      0 32px 90px rgba(15, 23, 42, 0.14),
      0 8px 24px rgba(37, 99, 235, 0.08),
      inset 0 1px 0 rgba(255, 255, 255, 0.92);
    backdrop-filter: blur(22px);
    -webkit-backdrop-filter: blur(22px);
    overflow: hidden;
  }

  .login-card::before {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    background:
      radial-gradient(circle at 82% 6%, rgba(10,132,255,.12), transparent 29%),
      linear-gradient(135deg, rgba(255,255,255,.62), transparent 42%);
  }

  .login-card > * {
    position: relative;
    z-index: 1;
  }

  .card-brand {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    margin-bottom: 12px;
  }

  .card-brand .login-logo-mark {
    width: 50px;
    height: 50px;
  }

  .login-brand-name {
    color: #111827;
    font-size: 28px;
    font-weight: 840;
    letter-spacing: -.055em;
  }

  .login-brand-sub {
    margin-bottom: 30px;
    text-align: center;
    color: #64748b;
    font-size: 15px;
    font-weight: 560;
  }

  .login-tabs {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 5px;
    padding: 5px;
    margin-bottom: 28px;
    border: 1px solid rgba(226,232,240,.90);
    border-radius: 17px;
    background: rgba(248,250,252,.76);
    box-shadow: inset 0 1px 2px rgba(15,23,42,.035);
  }

  .login-tab {
    min-height: 48px;
    border: 0;
    border-radius: 13px;
    background: transparent;
    color: #64748b;
    font-size: 15px;
    font-weight: 760;
    cursor: pointer;
    transition: color .18s ease, background .18s ease, box-shadow .18s ease, transform .18s ease;
  }

  .login-tab:hover {
    color: #0f172a;
  }

  .login-tab.active {
    color: #0756b8;
    background: rgba(255,255,255,.96);
    box-shadow: 0 12px 26px rgba(15,23,42,.09);
  }

  .login-form {
    display: none;
  }

  .login-form.active {
    display: block;
  }

  .login-field {
    margin-bottom: 18px;
  }

  .login-field label {
    display: block;
    margin-bottom: 8px;
    color: #1f2937;
    font-size: 14px;
    font-weight: 760;
  }

  .login-field input {
    width: 100%;
    height: 50px;
    padding: 0 16px;
    border: 1px solid rgba(203,213,225,.86);
    border-radius: 15px;
    background: rgba(255,255,255,.90);
    color: #111827;
    font-size: 15px;
    font-weight: 560;
    box-shadow: 0 1px 2px rgba(15,23,42,.04);
    transition: border-color .16s ease, box-shadow .16s ease, background .16s ease;
  }

  .login-field input:focus {
    outline: 0;
    border-color: rgba(10,132,255,.72);
    background: rgba(255,255,255,.98);
    box-shadow: 0 0 0 4px rgba(10,132,255,.13), 0 1px 2px rgba(15,23,42,.04);
  }

  .login-field input::placeholder {
    color: #a3adbb;
    font-weight: 520;
  }

  .login-password-wrap {
    position: relative;
  }

  .login-password-wrap input {
    padding-right: 66px;
  }

  .login-password-toggle {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    border: 0;
    background: transparent;
    color: var(--login-blue);
    font-size: 13px;
    font-weight: 760;
    cursor: pointer;
    padding: 6px 8px;
  }

  .login-options {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin: 2px 0 26px;
    font-size: 13px;
  }

  .login-remember {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    color: #64748b;
    font-weight: 620;
    cursor: pointer;
  }

  .login-remember input {
    width: 16px;
    height: 16px;
    accent-color: var(--login-blue);
  }

  .login-forgot {
    color: var(--login-blue);
    text-decoration: none;
    font-weight: 760;
  }

  .login-forgot:hover {
    text-decoration: underline;
  }

  .login-btn {
    width: 100%;
    height: 54px;
    border: 0;
    border-radius: 15px;
    background: linear-gradient(180deg, #1991ff 0%, #007aff 100%);
    color: #fff;
    font-size: 16px;
    font-weight: 820;
    cursor: pointer;
    box-shadow: 0 18px 36px rgba(0,122,255,.26);
    transition: transform .16s ease, filter .16s ease, box-shadow .16s ease;
  }

  .login-btn:hover {
    transform: translateY(-1px);
    filter: saturate(1.08);
    box-shadow: 0 22px 44px rgba(0,122,255,.30);
  }

  .login-btn:active {
    transform: translateY(0) scale(.99);
  }

  .login-error {
    display: none;
    margin-bottom: 16px;
    padding: 12px 14px;
    border-radius: 14px;
    color: #b42318;
    background: rgba(255,59,48,.10);
    border: 1px solid rgba(255,59,48,.20);
    font-size: 13px;
    font-weight: 650;
  }

  .login-error.show {
    display: block;
  }

  .reset-help {
    color: #64748b;
    font-size: 13px;
    line-height: 1.6;
    margin: 0 0 16px;
  }

  .reset-actions {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    margin-top: 20px;
  }

  .login-footer {
    text-align: center;
    margin-top: 30px;
    color: #64748b;
    font-size: 13px;
    font-weight: 560;
  }

  @media (max-width: 1024px) {
    body {
      overflow: auto;
    }

    .login-shell {
      grid-template-columns: 1fr;
      padding: 96px 28px 40px;
      gap: 34px;
      align-items: start;
    }

    .login-brand {
      left: 28px;
    }

    .login-left {
      min-height: 430px;
    }

    .server-visual {
      opacity: 0.24;
      width: 100%;
      height: 100%;
      inset: 0;
      object-position: center center;
    }

    .login-right {
      justify-content: flex-start;
    }

    .login-card {
      width: min(100%, 460px);
    }
  }

  @media (max-width: 768px) {
    body {
      overflow: auto;
    }

    .login-shell {
      padding: 90px 20px 28px;
    }

    .login-left {
      min-height: auto;
    }

    .hero-copy h1 {
      font-size: clamp(34px, 11vw, 46px);
    }

    .hero-copy p {
      font-size: 16px;
    }

    .feature-grid {
      grid-template-columns: 1fr;
      margin-top: 26px;
    }

    .server-visual {
      opacity: .16;
      width: 100%;
      height: 100%;
      inset: 0;
      object-position: center center;
    }

    .login-right {
      justify-content: center;
    }

    .login-card {
      width: min(100%, 460px);
      padding: 30px 22px 26px;
      border-radius: 26px;
    }
  }
</style>
</head>

<script>
(function() {
  var activeType = 'admin';

  function restoreSimpleHPCBrandHighlight() {
    document.querySelectorAll('.login-brand-name').forEach(function(el) {
      var text = (el.textContent || '').trim();
      var match = text.match(/^(simple)(hpc)$/i);
      var highlighted = el.querySelector('span');
      if (match && (!highlighted || highlighted.textContent !== match[2])) {
        el.innerHTML = match[1] + '<span>' + match[2] + '</span>';
      }
    });
  }

  restoreSimpleHPCBrandHighlight();
  setTimeout(restoreSimpleHPCBrandHighlight, 120);
  document.addEventListener('platform-config-applied', restoreSimpleHPCBrandHighlight);
  new MutationObserver(restoreSimpleHPCBrandHighlight).observe(document.body, {
    childList: true,
    subtree: true,
    characterData: true
  });

  document.querySelectorAll('.login-tab').forEach(function(tab) {
    tab.addEventListener('click', function() {
      document.querySelectorAll('.login-tab').forEach(function(t) { t.classList.remove('active'); });
      document.querySelectorAll('.login-form').forEach(function(f) { f.classList.remove('active'); });
      tab.classList.add('active');
      var target = tab.getAttribute('data-tab');
      activeType = target;
      document.getElementById(target + 'LoginForm').classList.add('active');
      document.getElementById('loginError').classList.remove('show');
    });
  });

  document.querySelectorAll('[data-password-target]').forEach(function(button) {
    button.addEventListener('click', function() {
      var input = document.getElementById(button.getAttribute('data-password-target'));
      var visible = input.type === 'text';
      input.type = visible ? 'password' : 'text';
      button.textContent = visible ? '显示' : '隐藏';
      button.setAttribute('aria-label', visible ? '显示密码' : '隐藏密码');
    });
  });

  document.querySelectorAll('.login-forgot').forEach(function(link) {
    link.addEventListener('click', function(e) {
      e.preventDefault();
      openPasswordReset(activeType);
    });
  });

  document.getElementById('adminLoginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    var username = document.getElementById('adminUsername').value.trim();
    var password = document.getElementById('adminPassword').value;
    var remember = document.getElementById('adminRemember').checked;
    doLogin(username, password, 'admin', remember);
  });

  document.getElementById('ldapLoginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    var username = document.getElementById('ldapUsername').value.trim();
    var password = document.getElementById('ldapPassword').value;
    var remember = document.getElementById('ldapRemember').checked;
    doLogin(username, password, 'ldap', remember);
  });

  function doLogin(username, password, type, remember) {
    var errorEl = document.getElementById('loginError');
    errorEl.classList.remove('show');

    fetch('/api/v1/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: username, password: password, type: type })
    })
    .then(function(r) {
      return r.json().then(function(data) {
        if (!r.ok) throw new Error(data.message || '登录失败');
        return data;
      });
    })
    .then(function(data) {
      if ((data.status === 'ok' || data.Status === 'ok') && (data.token || data.Token)) {
        localStorage.setItem('simplehpc_token', data.token || data.Token);
        localStorage.setItem('simplehpc_user', JSON.stringify(data.user || data.User));
        localStorage.setItem('simplehpc_auth_type', type);
        if (remember) {
          localStorage.setItem('simplehpc_remember', '1');
        } else {
          localStorage.removeItem('simplehpc_remember');
        }
        location.href = 'index.html';
      } else {
        errorEl.textContent = data.message || '登录失败，请检查账号密码';
        errorEl.classList.add('show');
      }
    })
    .catch(function(err) {
      errorEl.textContent = err.message || '网络错误，请稍后重试';
      errorEl.classList.add('show');
    });
  }

  function openPasswordReset(type) {
    var preset = type === 'admin'
      ? document.getElementById('adminUsername').value.trim()
      : document.getElementById('ldapUsername').value.trim();
    var modal = App.modal({
      title: '重置密码',
      width: '480px',
      showFooter: false,
      content:
        '<p class="reset-help">系统会向账号绑定邮箱发送 6 位验证码。验证成功后，新密码将发送至该邮箱。</p>' +
        '<div class="login-field"><label>账号类型</label><input value="' + (type === 'admin' ? '管理员账号' : 'LDAP 用户') + '" disabled></div>' +
        '<div class="login-field"><label>账号</label><input id="resetUsername" autocomplete="username" value="' + escapeHTML(preset) + '" placeholder="请输入账号"></div>' +
        '<div class="login-field" id="resetCodeField" hidden><label>邮箱验证码</label><input id="resetCode" inputmode="numeric" maxlength="6" autocomplete="one-time-code" placeholder="请输入 6 位验证码"></div>' +
        '<div class="login-error" id="resetError"></div>' +
        '<div class="reset-actions"><button type="button" class="btn btn-ghost" id="resetCancel">取消</button><button type="button" class="btn btn-primary" id="resetSubmit">发送验证码</button></div>'
    });
    var requestId = '';
    var submit = modal.el.querySelector('#resetSubmit');
    var error = modal.el.querySelector('#resetError');
    modal.el.querySelector('#resetCancel').addEventListener('click', modal.close);
    submit.addEventListener('click', async function() {
      error.classList.remove('show');
      submit.disabled = true;
      try {
        if (!requestId) {
          var username = modal.el.querySelector('#resetUsername').value.trim();
          if (!username) throw new Error('请输入需要重置的账号');
          var request = await postJSON('/api/v1/auth/password-reset/request', {
            username: username,
            type: type
          });
          requestId = request.requestId;
          modal.el.querySelector('#resetUsername').disabled = true;
          modal.el.querySelector('#resetCodeField').hidden = false;
          modal.el.querySelector('#resetCode').focus();
          submit.textContent = '验证并重置';
          App.toast(request.message, 'success');
        } else {
          var code = modal.el.querySelector('#resetCode').value.trim();
          if (!/^\d{6}$/.test(code)) throw new Error('请输入 6 位邮箱验证码');
          var result = await postJSON('/api/v1/auth/password-reset/confirm', {
            requestId: requestId,
            code: code
          });
          modal.close();
          App.toast(result.message || '密码重置成功，请至邮箱查看新密码', 'success');
        }
      } catch (err) {
        error.textContent = err.message || '操作失败，请稍后重试';
        error.classList.add('show');
      } finally {
        submit.disabled = false;
      }
    });
  }

  function postJSON(url, body) {
    return fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    }).then(function(response) {
      return response.json().then(function(data) {
        if (!response.ok) throw new Error(data.message || '请求失败');
        return data;
      });
    });
  }

  function escapeHTML(value) {
    return String(value || '').replace(/[&<>"']/g, function(character) {
      return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[character];
    });
  }

  var remembered = localStorage.getItem('simplehpc_remember');
  if (remembered) {
    var user = JSON.parse(localStorage.getItem('simplehpc_user') || '{}');
    if (user && user.username) {
      var type = localStorage.getItem('simplehpc_auth_type') || 'admin';
      if (type === 'admin') {
        document.getElementById('adminUsername').value = user.username;
        document.getElementById('adminRemember').checked = true;
      } else {
        document.getElementById('ldapUsername').value = user.username;
        document.getElementById('ldapRemember').checked = true;
      }
    }
  }
})();
</script>
</body>
</html>
